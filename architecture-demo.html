<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Platform - 架构展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: #666;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            background: #fee;
            color: #c33;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .tree-container {
            display: none;
        }
        
        .tree-node {
            margin: 10px 0;
            padding: 15px 20px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            transition: all 0.3s;
        }
        
        .tree-node:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .node-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .node-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .node-meta {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .level-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .coverage {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .coverage-bar {
            width: 100px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .coverage-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        
        .coverage-text {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }
        
        .node-children {
            margin-left: 30px;
            margin-top: 15px;
            border-left: 2px solid #e0e0e0;
            padding-left: 20px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏗️ 企业业务架构树</h1>
            <p>Skill Platform - 企业级 Skill 治理平台</p>
        </div>
        
        <div class="content">
            <div id="loading" class="loading">
                <div>⏳ 正在加载架构数据...</div>
            </div>
            
            <div id="error" class="error" style="display: none;"></div>
            
            <div id="treeContainer" class="tree-container">
                <div id="stats" class="stats"></div>
                <div id="tree"></div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:3000';
        let authToken = null;
        
        // 登录获取 token
        async function login() {
            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@skill.com',
                        password: 'password123'
                    })
                });
                
                const data = await response.json();
                if (data.success && data.data.access_token) {
                    authToken = data.data.access_token;
                    return true;
                }
                return false;
            } catch (error) {
                console.error('登录失败:', error);
                return false;
            }
        }
        
        // 获取架构树
        async function fetchArchitecture() {
            try {
                const response = await fetch(`${API_BASE}/api/architecture/trees/active`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                const data = await response.json();
                if (data.success && data.data) {
                    return data.data;
                }
                throw new Error('获取架构数据失败');
            } catch (error) {
                console.error('获取架构数据失败:', error);
                throw error;
            }
        }
        
        // 渲染节点
        function renderNode(node, level = 0) {
            const coverage = node.totalSkills > 0 
                ? Math.round((node.coveredSkills / node.totalSkills) * 100) 
                : 0;
            
            const levelNames = {
                1: '域',
                2: '子域',
                3: '流程组',
                4: '流程',
                5: '子流程',
                6: '操作'
            };
            
            let html = `
                <div class="tree-node" style="margin-left: ${level * 20}px">
                    <div class="node-header">
                        <div class="node-title">${node.name}</div>
                        <div class="node-meta">
                            <span class="level-badge">L${node.level} ${levelNames[node.level] || ''}</span>
                            ${node.totalSkills > 0 ? `
                                <div class="coverage">
                                    <div class="coverage-bar">
                                        <div class="coverage-fill" style="width: ${coverage}%"></div>
                                    </div>
                                    <span class="coverage-text">${node.coveredSkills}/${node.totalSkills} (${coverage}%)</span>
                                </div>
                            ` : ''}
                        </div>
                    </div>
            `;
            
            if (node.children && node.children.length > 0) {
                html += '<div class="node-children">';
                node.children.forEach(child => {
                    html += renderNode(child, level + 1);
                });
                html += '</div>';
            }
            
            html += '</div>';
            return html;
        }
        
        // 渲染统计
        function renderStats(tree) {
            const totalNodes = countNodes(tree.nodes);
            const totalSkills = tree.nodes.reduce((sum, node) => sum + (node.totalSkills || 0), 0);
            const coveredSkills = tree.nodes.reduce((sum, node) => sum + (node.coveredSkills || 0), 0);
            const coverage = totalSkills > 0 ? Math.round((coveredSkills / totalSkills) * 100) : 0;
            
            return `
                <div class="stat-card">
                    <div class="stat-value">${totalNodes}</div>
                    <div class="stat-label">架构节点</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalSkills}</div>
                    <div class="stat-label">总 Skill 数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${coveredSkills}</div>
                    <div class="stat-label">已覆盖 Skill</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${coverage}%</div>
                    <div class="stat-label">覆盖率</div>
                </div>
            `;
        }
        
        // 统计节点数
        function countNodes(nodes) {
            let count = 0;
            nodes.forEach(node => {
                count++;
                if (node.children && node.children.length > 0) {
                    count += countNodes(node.children);
                }
            });
            return count;
        }
        
        // 初始化
        async function init() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const treeContainer = document.getElementById('treeContainer');
            const treeEl = document.getElementById('tree');
            const statsEl = document.getElementById('stats');
            
            try {
                // 登录
                const loginSuccess = await login();
                if (!loginSuccess) {
                    throw new Error('登录失败，请检查后端服务是否启动');
                }
                
                // 获取架构数据
                const tree = await fetchArchitecture();
                
                // 渲染
                statsEl.innerHTML = renderStats(tree);
                treeEl.innerHTML = tree.nodes.map(node => renderNode(node)).join('');
                
                loadingEl.style.display = 'none';
                treeContainer.style.display = 'block';
                
            } catch (error) {
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.textContent = `❌ ${error.message}`;
                console.error('初始化失败:', error);
            }
        }
        
        // 页面加载完成后执行
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
